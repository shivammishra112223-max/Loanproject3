<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Loan Prediction System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
  <div class="card p-4 shadow">
    <h3 class="mb-3 text-center">🏦 Loan Application Portal</h3>

    <form method="POST" action="/predict">
      <!-- Age -->
      <div class="mb-3">
        <label class="form-label">Age</label>
        <input type="number" name="age" class="form-control" min="18" max="65" required>
      </div>

      <!-- Gender -->
      <div class="mb-3">
        <label class="form-label">Gender</label>
        <select name="gender" class="form-select" required>
          <option value="">Select your gender</option>
          <option value="1">Male</option>
          <option value="0">Female</option>
        </select>
      </div>

      <!-- Bank Selection -->
      <div class="mb-3">
        <label class="form-label">Select Bank</label>
        <select name="bank" class="form-select" required>
          <option value="">Choose a bank</option>
          <option value="SBI">State Bank of India</option>
          <option value="HDFC">HDFC Bank</option>
          <option value="ICICI">ICICI Bank</option>
          <option value="AXIS">Axis Bank</option>
        </select>
      </div>

      <!-- Submit Button -->
      <button type="submit" class="btn btn-primary w-100">🔍 Predict Loan Approval</button>

      
    </form>
  </div>
</div>
<print>HELLOW SHIVAM bhai</print>
</body>
</html>
