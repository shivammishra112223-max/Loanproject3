<!DOCTYPE html>
<html>

<head>

    <title>Signup</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card p-4 mx-auto shadow"
         style="max-width:400px;">

        <h2 class="text-center mb-4">
            Signup Page
        </h2>

        <!-- FORM START -->
        <form action="/register" method="POST">

            <!-- FULL NAME -->
            <input
                type="text"
                name="full_name"
                class="form-control mb-3"
                placeholder="Full Name"
                required
            >

            <!-- USERNAME -->
            <input
                type="text"
                name="username"
                class="form-control mb-3"
                placeholder="Username"
                required
            >

            <!-- EMAIL -->
            <input
                type="email"
                name="email"
                class="form-control mb-3"
                placeholder="Email"
                required
            >

            <!-- MOBILE -->
            <input
                type="text"
                name="mobile"
                class="form-control mb-3"
                placeholder="Mobile Number"
                required
            >

            <!-- PASSWORD -->
            <input
                type="password"
                name="password"
                class="form-control mb-3"
                placeholder="Password"
                required
            >

            <!-- CITY -->
            <input
                type="text"
                name="city"
                class="form-control mb-3"
                placeholder="City"
                required
            >

            <!-- BUTTON -->
            <button
                type="submit"
                class="btn btn-primary w-100"
            >
                Register
            </button>

            <!-- LOGIN LINK -->
            <p class="text-center mt-3">

                Already have an account?

                <a href="/">
                    Login
                </a>

            </p>

        </form>
        <!-- FORM END -->

    </div>

</div>

</body>
</html>
