<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Loan Prediction Login</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Font Awesome -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    height:100vh;

    background: linear-gradient(135deg,#1e3c72,#2a5298);

    display:flex;
    justify-content:center;
    align-items:center;

    overflow:hidden;
}

/* Main Container */
.login-container{
    width:90%;
    max-width:1000px;

    min-height:600px;

    display:flex;

    border-radius:25px;

    overflow:hidden;

    background: rgba(255,255,255,0.1);

    backdrop-filter: blur(15px);

    box-shadow:0 15px 40px rgba(0,0,0,0.3);

    animation:fadeIn 1s ease;
}

/* Left Section */
.left-side{
    flex:1;

    background: linear-gradient(135deg,#00c6ff,#0072ff);

    color:white;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    padding:40px;
}

.left-side h1{
    font-size:45px;
    font-weight:bold;
}

.left-side p{
    margin-top:20px;
    font-size:18px;
    text-align:center;
}

.left-side img{
    width:280px;
    margin-top:30px;

    animation:float 3s ease-in-out infinite;
}

/* Right Section */
.right-side{
    flex:1;

    background:white;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:40px;
}

.login-box{
    width:100%;
    max-width:350px;
}

.login-box h2{
    font-weight:bold;
    margin-bottom:30px;
    color:#1e3c72;
}

/* Input */
.input-group{
    margin-bottom:20px;
}

.input-group-text{
    background:#1e3c72;
    color:white;
    border:none;
}

.form-control{
    height:50px;
    border-radius:0 10px 10px 0;
}

.form-control:focus{
    box-shadow:0 0 10px rgba(0,114,255,0.3);
    border-color:#0072ff;
}

/* Button */
.login-btn{
    width:100%;
    height:50px;

    border:none;
    border-radius:10px;

    background: linear-gradient(135deg,#00c6ff,#0072ff);

    color:white;
    font-size:18px;
    font-weight:bold;

    transition:0.3s;
}

.login-btn:hover{
    transform:translateY(-3px);

    box-shadow:0 10px 20px rgba(0,114,255,0.3);
}

/* Links */
.extra-links{
    display:flex;
    justify-content:space-between;

    margin-top:15px;

    font-size:14px;
}

.extra-links a{
    text-decoration:none;
}

/* Signup */
.signup{
    text-align:center;
    margin-top:20px;
}

/* Animations */
@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(-20px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

@keyframes float{
    0%{
        transform:translateY(0px);
    }

    50%{
        transform:translateY(-15px);
    }

    100%{
        transform:translateY(0px);
    }
}

/* Mobile */
@media(max-width:768px){

    .left-side{
        display:none;
    }

    .login-container{
        width:95%;
    }
}

</style>
</head>

<body>

<div class="login-container">

    <!-- Left Side -->
    <div class="left-side">

        <h1>Loan Prediction</h1>

        <p>
            Smart AI Based Banking & Loan Approval System
        </p>

        <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">

    </div>

    <!-- Right Side -->
    <div class="right-side">

        <div class="login-box">

            <h2 class="text-center">
                Welcome Back
            </h2>

            <form action="/login" method="POST">

                <!-- Username -->
                <div class="input-group">

                    <span class="input-group-text">
                        <i class="fa fa-user"></i>
                    </span>

                    <input type="text"
                           name="username"
                           class="form-control"
                           placeholder="Enter Username"
                           required>

                </div>

                <!-- Password -->
                <div class="input-group">

                    <span class="input-group-text">
                        <i class="fa fa-lock"></i>
                    </span>

                    <input type="password"
                           id="password"
                           name="password"
                           class="form-control"
                           placeholder="Enter Password"
                           required>

                    <span class="input-group-text"
                          onclick="togglePassword()"
                          style="cursor:pointer;">

                        <i class="fa fa-eye"></i>

                    </span>

                </div>

                <!-- Error -->
                
                <p class="text-danger text-center fw-bold">
                
                </p>
               

                <!-- Links -->
                <div class="extra-links">

                    <div>
                        <input type="checkbox">
                        Remember Me
                    </div>

                    <a href="#">
                        Forgot Password?
                    </a>

                </div>

                <!-- Button -->
                <button type="submit"
                        class="login-btn mt-4">

                    <i class="fa fa-sign-in-alt"></i>
                    Login

                </button>

                <!-- Signup -->
                <div class="signup">

                    Don't have an account?

                    <a href="{{ url_for('register') }}">
                        Sign Up
                    </a>

                </div>

            </form>

        </div>

    </div>

</div>



</body>
</html>
